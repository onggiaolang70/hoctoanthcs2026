<!DOCTYPE html>
<html lang="vi" class="bg-[#176A5D]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HỌC TOÁN THCS TRỰC TUYẾN</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              edu: {
                dark: '#176A5D',   // Xanh lục đậm chính
                mint: '#2FD3A7',   // Xanh Mint highlight
                light: '#FFFFFF',  // Chữ trắng
              }
            }
          }
        }
      }
    </script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #176A5D;
        color: #FFFFFF;
        margin: 0;
      }
      /* Hiệu ứng ánh sáng nhẹ phía sau */
      .glow-bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 20%, rgba(47, 211, 167, 0.1) 0%, transparent 50%);
        pointer-events: none; z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="glow-bg"></div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
