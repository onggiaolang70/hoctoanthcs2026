<!DOCTYPE html>
<html lang="vi" class="bg-[#020617]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HỌC TOÁN THCS TRỰC TUYẾN</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            },
            colors: {
              navy: {
                950: '#020617', // Nền xanh đen thẫm
                900: '#0f172a', // Nền thẻ (Card)
                800: '#1e293b', // Viền và nút
              }
            }
          }
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #ffffff; /* Chữ trắng thuần */
        margin: 0;
        overflow-x: hidden;
      }

      /* Hiệu ứng hào quang (Glow) giống trong hình */
      .glow-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 20%, rgba(251, 146, 60, 0.1) 0%, transparent 50%);
        pointer-events: none;
        z-index: -1;
      }

      mjx-container {
        display: inline-block !important;
        margin: 0 !important;
        vertical-align: middle !important;
      }
    </style>
  </head>
  <body>
    <div class="glow-bg"></div>

    <div id="root"></div>
    
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
